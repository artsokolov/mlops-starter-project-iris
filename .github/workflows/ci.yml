name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: make install

    - name: Run code quality checks (Linting, Formatting Check, Type Check, Pre-commit hooks)
      run: make check-all

    - name: Run tests with coverage
      run: make test-cov

  train_model:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: make install

      - name: Load data
        run: uv run src/load_data.py

      - name: Split dataset
        run: uv run src/split_dataset.py --test_size 0.2

      - name: Train model
        run: uv run src/train.py

      - uses: actions/upload-artifact@v4
        with:
          name: data
          path: data/

      - uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.joblib

  evaluate_model:
    runs-on: ubuntu-latest
    needs: train_model

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: make install

      - uses: actions/download-artifact@v4
        with:
          name: data
          path: data/

      - uses: actions/download-artifact@v4
        with:
          name: model
          path: models/

      - name: Check if model exists
        run: |
          if [ ! -f "models/model.joblib" ]; then
            echo "❌ File not found: models/model.joblib"
            exit 1
          fi

      - name: Evaluate model
        run: uv run src/evaluate.py

      - uses: actions/upload-artifact@v4
        with:
          name: evaluation-metrics
          path: data/eval.json
